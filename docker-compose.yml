services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: windninja
      POSTGRES_PASSWORD: windninja
      POSTGRES_DB: windninja
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windninja"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
